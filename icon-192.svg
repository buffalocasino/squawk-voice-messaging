<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  <!-- Bird silhouette — stylized squawk bird facing right -->
  <g fill="#ffffff">
    <!-- Body -->
    <ellipse cx="230" cy="270" rx="130" ry="100"/>
    <!-- Head -->
    <circle cx="320" cy="200" r="65"/>
    <!-- Beak — open, squawking -->
    <polygon points="380,195 430,180 430,210"/>
    <!-- Eye -->
    <circle cx="335" cy="190" r="14" fill="#1a73e8"/>
    <circle cx="338" cy="187" r="6" fill="#ffffff"/>
    <!-- Wing -->
    <ellipse cx="190" cy="285" rx="75" ry="55" fill="#b3c7f5" opacity="0.6"/>
    <!-- Tail feathers -->
    <ellipse cx="110" cy="260" rx="60" ry="30" transform="rotate(-20 110 260)" fill="#dde7ff" opacity="0.5"/>
    <ellipse cx="100" cy="285" rx="55" ry="25" transform="rotate(-10 100 285)" fill="#dde7ff" opacity="0.4"/>
    <!-- Sound waves from beak -->
    <path d="M445 185 Q470 200 445 215" stroke="#ffffff" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M460 170 Q495 200 460 230" stroke="#ffffff" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path d="M475 155 Q520 200 475 245" stroke="#ffffff" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.3"/>
  </g>
</svg>